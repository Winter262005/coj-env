name: aws-finops-janitor
version: 1.1.0
description: >
  An Autonomous AWS FinOps & DevSecOps reinforcement learning environment.
  The agent optimizes cloud infrastructure by cleaning up orphaned EBS volumes, 
  shutting down idle dev EC2 instances, and securing public RDS databases.

entrypoint: server.app:app

observation_space:
  type: dict
  fields:
    instances: "list of Instance (id, instance_type, cpu_utilization, status, tag)"
    volumes: "list of Volume (id, volume_type, state, age)"
    databases: "list of Database (id, publicly_accessible)"
    cost: "float — simulated hourly AWS burn rate"
    health: "float [0,1] — compliance score (AWS Security Hub / Trusted Advisor)"
    alerts: "list[str] — active AWS compliance alert codes"

action_space:
  type: dict
  fields:
    action_type: "str — delete_volume | stop_instance | secure_database | noop"
    target_id: "str | null — resource ID to act on"

tasks:
  - name: zombie_reaper
    description: Delete all unattached (state=available) EBS volumes older than 30 days
    difficulty: easy
    reward_range: [0.05, 0.95]
    grader: env.tasks.zombie_reaper_grader

  - name: dev_shutdown
    description: Stop all idle dev EC2 GPU instances without affecting production
    difficulty: medium
    reward_range: [0.05, 0.95]
    grader: env.tasks.dev_shutdown_grader

  - name: auditor
    description: >
      Simultaneously reduce AWS costs, secure public RDS databases,
      maintain production uptime, and avoid deleting in-use EBS volumes.
    difficulty: hard
    reward_range: [0.05, 0.95]
    grader: env.tasks.auditor_grader

baseline:
  model: Qwen/Qwen2.5-72B-Instruct
  scores:
    zombie_reaper: 0.95
    dev_shutdown: 0.95
    auditor: 0.95
    average: 0.95
