name: cloud-ops-janitor
version: "1.2.0"
description: >
  An OpenEnv reinforcement learning environment simulating a cloud infrastructure
  operations team. Agents must manage EC2 instances, EBS volumes, and RDS databases
  across four independent tasks, each exposing a distinct real-world RL tradeoff.

tasks:
  spend_guard:
    difficulty: easy-medium
    max_steps: 10
    description: >
      Reduce hourly AWS spend by >= 35% without breaching the SLA threshold
      (system health >= 0.65). Instances have a 'criticality' field (high/medium/low).
      Stopping HIGH-criticality instances saves the most money but immediately
      drops health below the SLA floor -> near-zero grader score.
      Correct strategy: stop LOW instances, delete zombie volumes, optionally
      downgrade MEDIUM instances (saves cost with no health penalty).
    tradeoff: cost_reduction <-> sla_availability
    grader_weights:
      cost_score: 0.65    # reaches 1.0 at >= 35% reduction
      health_score: 0.35  # hard floor at health < 0.65

  compliance_sprint:
    difficulty: medium
    max_steps: 5           # deliberately tight — 6 issues, 5 steps
    description: >
      Fix security compliance violations in PRIORITY ORDER within a 5-step budget.
      There are 6 total issues (2 CRITICAL + 3 HIGH + 1 MEDIUM) but only 5 steps.
      The agent MUST skip the lowest-severity issue (MEDIUM) to maximise score.
      An agent that wastes a step on the zombie volume decoy (a cost issue, not
      compliance) cannot fix all CRITICALs and receives a 0.7x score multiplier
      penalty. An agent that fixes all CRITICALs gets a 1.3x multiplier.
    tradeoff: coverage <-> severity_priority
    issue_types:
      CRITICAL: publicly_accessible RDS databases  (action: secure_database)
      HIGH:     encrypted=False in-use EBS volumes  (action: encrypt_volume)
      MEDIUM:   idle dev instances cpu < 5%         (action: stop_instance)
      DECOY:    zombie EBS volume (state=available, age>30) — cost issue only
    grader_weights:
      severity_weighted_score: variable (CRITICAL=3, HIGH=2, MEDIUM=1)
      priority_multiplier: 1.3 if all CRITICALs fixed; 0.7 otherwise
      waste_penalty: -0.12 per non-compliance action taken

  rightsizer:
    difficulty: medium-hard
    max_steps: 10
    description: >
      Rightsize a mixed EC2 fleet in BOTH directions simultaneously.
      Overprovisioned instances (downgrade_target set, cpu 7-20%) must be downgraded.
      Underprovisioned instances (upgrade_target set, cpu 82-97%) must be upgraded.
      Right-sized instances (no target, cpu 42-65%) must NOT be touched — they are traps.
      Wrong direction (upgrading overprovisioned or downgrading underprovisioned) and
      touching right-sized instances each apply a 0.25 per-mistake penalty.
    tradeoff: cost_efficiency <-> performance_maintained
    instance_classes:
      overprovisioned:  downgrade_target set, cpu 7-20%  -> use downgrade_instance
      underprovisioned: upgrade_target set, cpu 82-97%   -> use upgrade_instance
      right_sized:      no target, cpu 42-65%            -> DO NOT TOUCH (trap)
    grader_weights:
      correct_score: (correct_downs + correct_ups) / total_targets
      wrong_penalty: -0.25 per wrong-direction or right-sized-touched action

  cloud_auditor:
    difficulty: hard
    max_steps: 10
    description: >
      Full cloud infrastructure audit requiring multi-domain expertise.
      Security: 1 publicly accessible RDS database (fix first — highest priority).
      Cost:     2 zombie EBS volumes + 1 overprovisioned EC2 instance.
      TRAP:     1 protected instance (protected=True) that looks identical to an
                idle dev instance (tag=dev, cpu<5%, status=running). The ONLY
                distinguishing field is protected=True. Touching it = near-zero score.
      Also must NOT stop the prod instance.
    tradeoff: fix_all_issues <-> avoid_protected_resources
    hard_fails:
      - protected instance stopped or downgraded -> score ~ 0.0
      - prod instance stopped                    -> score ~ 0.0
      - in-use volume deleted                    -> score ~ 0.0
    grader_weights:
      security_score: 0.40   # public DBs secured
      cost_score: 0.40       # zombies deleted + overprovisioned downgraded
      integrity_score: 0.20  # no forbidden actions taken

observation_space:
  instances:
    - id:              "string — AWS EC2 resource ID"
    - instance_type:   "string — e.g. m5.xlarge, g4dn.xlarge"
    - cpu_utilization: "float  — CloudWatch CPU% (0-100)"
    - status:          "string — running | stopped"
    - tag:             "string — dev | prod"
    - hourly_cost:     "float  — real AWS on-demand $/hr"
    - criticality:     "string — high | medium | low  (SLA impact of stopping)"
    - protected:       "bool   — MUST NOT be stopped or downgraded if True"
    - downgrade_target:"string? — cheaper instance type (overprovisioned only)"
    - upgrade_target:  "string? — larger instance type (underprovisioned only)"
  volumes:
    - id:        "string"
    - volume_type: "string — io2 | gp3"
    - state:     "string — available (zombie) | in-use (attached)"
    - age:       "int    — days since creation"
    - hourly_cost: "float"
    - encrypted: "bool   — False = HIGH severity compliance issue"
  databases:
    - id:                  "string"
    - publicly_accessible: "bool — True = CRITICAL severity security risk"
  cost:   "float — total real-time hourly burn rate ($)"
  health: "float — 0-1 SLA/compliance posture"
  alerts: "list[string] — active Trusted Advisor and Security Hub alerts"

action_space:
  - action_type: delete_volume
    target_id: "<volume_id>"
    description: "Delete an unattached zombie volume (state=available, age>30)"

  - action_type: stop_instance
    target_id: "<instance_id>"
    description: "Stop a running EC2 instance. Check criticality and protected fields."

  - action_type: secure_database
    target_id: "<database_id>"
    description: "Make a publicly_accessible RDS database private"

  - action_type: downgrade_instance
    target_id: "<instance_id>"
    description: "Downgrade an overprovisioned instance (requires downgrade_target set)"

  - action_type: upgrade_instance
    target_id: "<instance_id>"
    description: "Upgrade an underprovisioned instance (requires upgrade_target set)"

  - action_type: encrypt_volume
    target_id: "<volume_id>"
    description: "Encrypt an unencrypted in-use volume (encrypted=False, state=in-use)"

  - action_type: noop
    target_id: null
    description: "No operation — wastes a step, avoid unless nothing useful to do"
